<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Impromptu Speech</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Newsreader:ital,opsz,wght@0,6..72,400;1,6..72,400&family=Space+Mono&display=swap" rel="stylesheet" />
<style>
  :root { --paper:#f6efe2; --paper2:#efe6d4; --ink:#2c2a24; --muted:#7a7363;
          --euca:#5b7a5e; --gold:#b08d3e; --gold-l:#d8b766; --line:#d8cdb6; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    color:var(--ink); font-family:'Newsreader',Georgia,serif; padding:24px;
    background-color:var(--paper);
    background-image:
      radial-gradient(circle at 50% 50%, rgba(176,141,62,.05) 0 2px, transparent 2px),
      linear-gradient(135deg, rgba(176,141,62,.04) 25%, transparent 25%);
    background-size:26px 26px,26px 26px; -webkit-font-smoothing:antialiased; }
  .eyebrow { font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.42em; color:var(--gold); text-transform:uppercase; margin-bottom:8px; }
  h1 { font-family:'Fraunces',serif; font-weight:700; font-size:clamp(30px,6vw,52px); margin:0 0 6px; }
  .sub { color:var(--muted); font-style:italic; margin-bottom:36px; }
  .tiles { display:grid; grid-template-columns:1fr 1fr; gap:18px; max-width:680px; }
  @media (max-width:620px){ .tiles { grid-template-columns:1fr; } }
  a.tile { text-decoration:none; color:var(--ink); background:var(--paper2);
    border:1px solid var(--line); border-radius:18px; padding:30px 24px; display:block;
    transition:transform .15s, border-color .2s; }
  a.tile:hover { transform:translateY(-4px); border-color:var(--gold-l); }
  .tile .ic { font-size:46px; margin-bottom:14px; }
  .tile .nm { font-family:'Fraunces',serif; font-size:20px; margin-bottom:6px; }
  .tile .ds { color:var(--muted); font-size:14px; }
  .rule { height:1px; background:var(--line); max-width:200px; margin:0 auto 30px; }
</style>
</head>
<body>
<div style="text-align:center;">
  <div class="eyebrow">Satriwithaya · English Program</div>
  <h1>Impromptu Speech</h1>
  <div class="sub">Choose your screen</div>
  <div class="rule"></div>
  <div class="tiles">
    <a class="tile" href="master.html">
      <div class="ic">🖥️</div>
      <div class="nm">Master Display</div>
      <div class="ds">Prompts, timers, random number &amp; live leaderboard.</div>
    </a>
    <a class="tile" href="evaluate.html">
      <div class="ic">📝</div>
      <div class="nm">Evaluation Console</div>
      <div class="ds">For the audience to score each speaker.</div>
    </a>
  </div>
</div>
</body>
</html>
